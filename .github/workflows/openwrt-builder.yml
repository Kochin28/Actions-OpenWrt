name: CT3003_LEDE_UBI_SUCCESS

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential git libncurses5-dev gawk zlib1g-dev libssl-dev libelf-dev python3
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install Feeds
      run: |
        cd openwrt
        # 加入大雕核心插件源
        sed -i 's/^#\(.*helloworld\)/\1/' feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        cd openwrt
        # 1. 設置後台 IP 為 192.168.6.1
        sed -i 's/192.168.1.1/192.168.6.1/g' package/base-files/files/bin/config_generate
        
        # 2. 核心配置：鎖定 Mediatek Filogic 同 CT3003
        cat >> .config <<EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_cetron_ct3003=y
        
        # 核心翻牆插件 (SSR Plus & Passwall)
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        
        # 系統加速與管理
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-ramfree=y
        CONFIG_PACKAGE_luci-app-cpufreq=y
        
        # 界面語言 (簡體中文)
        CONFIG_LUCI_LANG_zh_Hans=y
        
        # 極致精簡：移除 IPv6 (根據你之前要求)
        # CONFIG_IPV6 is not set
        # CONFIG_PACKAGE_dnsmasq_full_dhcpv6 is not set
        EOF
        
        # 3. 處理 dnsmasq 衝突
        echo "CONFIG_PACKAGE_dnsmasq=n" >> .config
        echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
        
        make defconfig

    - name: Final Compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: CT3003_UBI_FIRMWARE
        # 攞晒 factory 同 sysupgrade，今次你兩個都可以試
        path: openwrt/bin/targets/mediatek/filogic/*.bin
