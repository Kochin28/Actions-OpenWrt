name: OpenWrt_CT3003_Final_Fix

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install Feeds (極限修復)
      run: |
        cd openwrt
        # 添加源
        echo 'src-git passwall https://github.com/xiaorouji/openwrt-passwall;main' >> feeds.conf.default
        echo 'src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages;main' >> feeds.conf.default
        
        # 1. 更新所有源
        ./scripts/feeds update -a
        
        # 2. 強制刪除所有已知會衝突嘅資料夾 (針對你 Log 報錯嗰堆)
        rm -rf feeds/packages/net/v2ray-geodata
        rm -rf feeds/packages/net/mosdns
        rm -rf feeds/packages/net/xray-core
        rm -rf feeds/packages/net/v2ray-core
        rm -rf feeds/packages/net/sing-box
        rm -rf feeds/packages/net/v2ray-plugin
        rm -rf feeds/packages/net/xray-plugin
        rm -rf feeds/packages/net/shadowsocks-rust
        rm -rf feeds/packages/net/shadowsocksr-libev
        
        # 3. 再安裝
        ./scripts/feeds install -f -a

    - name: Load Custom Configuration
      run: |
        cd openwrt
        # 預設 IP 改做你鍾意嘅 192.168.6.1
        sed -i 's/192.168.1.1/192.168.6.1/g' package/base-files/files/bin/config_generate
        
        # 寫入 CT3003 配置
        cat >> .config <<EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_cetron_ct3003=y
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_LUCI_LANG_zh_Hans=y
        EOF
        
        make defconfig

    - name: Final Compile
      run: |
        cd openwrt
        # 呢步會行好耐，只要過咗 Feeds 就得
        make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_CT3003_BIN
        path: openwrt/bin/targets/mediatek/filogic/*.bin
