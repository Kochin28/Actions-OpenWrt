name: OpenWrt_CT3003_Final_Success

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install Feeds (終極手術)
      run: |
        cd openwrt
        # 添加第三方源
        echo 'src-git passwall https://github.com/xiaorouji/openwrt-passwall;main' >> feeds.conf.default
        echo 'src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages;main' >> feeds.conf.default
        
        # 1. 更新索引 (呢步通常唔會報錯)
        ./scripts/feeds update -a
        
        # 2. 關鍵手術：直接去源碼個 folder 度剷走嗰啲「撞名」嘅資料夾
        # 既然佢哋同 PassWall 衝突，我哋就優先保住 PassWall
        [ -d feeds/packages/net/v2ray-geodata ] && rm -rf feeds/packages/net/v2ray-geodata
        [ -d feeds/packages/net/mosdns ] && rm -rf feeds/packages/net/mosdns
        [ -d feeds/packages/net/xray-core ] && rm -rf feeds/packages/net/xray-core
        [ -d feeds/packages/net/v2ray-core ] && rm -rf feeds/packages/net/v2ray-core
        [ -d feeds/packages/net/sing-box ] && rm -rf feeds/packages/net/sing-box
        [ -d feeds/packages/net/v2ray-plugin ] && rm -rf feeds/packages/net/v2ray-plugin
        [ -d feeds/packages/net/xray-plugin ] && rm -rf feeds/packages/net/xray-plugin
        [ -d feeds/luci/applications/luci-app-passwall ] && rm -rf feeds/luci/applications/luci-app-passwall
        
        # 3. 宜家再行 install，保證乾乾淨淨，唔會再報 exit code 1
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        cd openwrt
        # 修改 IP 為 192.168.6.1
        sed -i 's/192.168.1.1/192.168.6.1/g' package/base-files/files/bin/config_generate
        
        # 寫入 CT3003 核心配置
        cat >> .config <<EOF
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_cetron_ct3003=y
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_LUCI_LANG_zh_Hans=y
        EOF
        
        # 補完依賴
        make defconfig

    - name: Final Compile
      run: |
        cd openwrt
        # 第一次編譯建議用單線程，V=s 方便睇錯喺邊
        make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_CT3003_OK
        path: openwrt/bin/targets/mediatek/filogic/*.bin
