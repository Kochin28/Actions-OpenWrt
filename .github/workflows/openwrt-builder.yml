name: LEDE_CT3003_Extreme_Lite

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential git libncurses5-dev gawk zlib1g-dev libssl-dev libelf-dev python3 python3-setuptools
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        cd openwrt
        # 1. 修改默認 IP 為 192.168.6.1
        sed -i 's/192.168.1.1/192.168.6.1/g' package/base-files/files/bin/config_generate
        
        # 2. 寫入極致精簡配置
        cat >> .config <<EOF
        # 硬件平台
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_mediatek_filogic_DEVICE_cetron_ct3003=y
        
        # 核心插件 1：SSR Plus+ (集成 Xray 核心)
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
        
        # 核心插件 2：PassWall 2
        CONFIG_PACKAGE_luci-app-passwall=y
        CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
        
        # 核心加速：TurboACC
        CONFIG_PACKAGE_luci-app-turboacc=y
        CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOAD=y
        CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA=y
        
        # 內存管理工具
        CONFIG_PACKAGE_luci-app-ramfree=y
        CONFIG_LUCI_LANG_zh_Hans=y

        # ================= 負優化清理 (精簡核心) =================
        # 禁用 IPv6 (大幅釋放內核內存)
        # CONFIG_IPV6 is not set
        # CONFIG_PACKAGE_ipv6helper is not set
        # CONFIG_PACKAGE_luci-proto-ipv6 is not set
        
        # 剷走 LEDE 預設但你唔需要嘅累贅
        # CONFIG_PACKAGE_luci-app-access-control is not set
        # CONFIG_PACKAGE_luci-app-arpbind is not set
        # CONFIG_PACKAGE_luci-app-autoreboot is not set
        # CONFIG_PACKAGE_luci-app-ddns is not set
        # CONFIG_PACKAGE_luci-app-filetransfer is not set
        # CONFIG_PACKAGE_luci-app-nlbwmon is not set
        # CONFIG_PACKAGE_luci-app-upnp is not set
        # CONFIG_PACKAGE_luci-app-vlmcsd is not set
        # CONFIG_PACKAGE_luci-app-vsftpd is not set
        # CONFIG_PACKAGE_luci-app-wol is not set
        EOF
        
        make defconfig

    - name: Final Compile
      run: |
        cd openwrt
        # 單線程編譯，確保 100% 成功
        make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: CT3003_Extreme_Lite_BIN
        path: openwrt/bin/targets/mediatek/filogic/*-sysupgrade.bin
